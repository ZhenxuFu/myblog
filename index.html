<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>像素贪吃蛇</title>
<style>
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
canvas{background:#222;image-rendering:pixelated;border:4px solid #555}
</style></head>
<body><canvas id="c" width="400" height="400"></canvas>
<script>
const C=c.getContext('2d'),W=400,S=20,R=W/S;
let snake=[{x:10,y:10}],food={x:15,y:10},dir={x:1,y:0},next=dir,alive=1,score=0,tick=0;
function place(){do{food.x=Math.floor(Math.random()*R);food.y=Math.floor(Math.random()*R)}while(snake.some(s=>s.x==food.x&&s.y==food.y))}
function reset(){snake=[{x:10,y:10}];dir=next={x:1,y:0};score=0;alive=1;place()}
function draw(){
  C.fillStyle='#222';C.fillRect(0,0,W,W);
  C.fillStyle='#e33';C.fillRect(food.x*S,food.y*S,S-2,S-2);  // 食物大小改为 S-2
  for(let s of snake){
    C.fillStyle=s==snake[0]?'#5a5':'#474';
    C.fillRect(s.x*S,s.y*S,S-2,S-2)
  }
  C.font='20px "Courier New"';C.fillStyle='#fff';C.fillText('SCORE:'+score,8,28);
  if(!alive){C.font='28px "Courier New"';C.fillText('GAME OVER',60,200);C.fillText('SPACE RESTART',40,250)}
}
function update(){
  if(!alive)return;
  if(++tick%12!==0)return;
  if(!(dir.x===-next.x&&dir.y===-next.y))dir=next;
  let h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(h.x<0||h.x>=R||h.y<0||h.y>=R||snake.some(s=>s.x==h.x&&s.y==h.y)){alive=0;return}
  snake.unshift(h);
  if(h.x==food.x&&h.y==food.y){score++;place()}else snake.pop()
}
function loop(){update();draw();requestAnimationFrame(loop)}
onkeydown=e=>{
  e.preventDefault();
  if(e.key=='ArrowUp')next={x:0,y:-1};
  if(e.key=='ArrowDown')next={x:0,y:1};
  if(e.key=='ArrowLeft')next={x:-1,y:0};
  if(e.key=='ArrowRight')next={x:1,y:0};
  if(e.key==' '&&!alive)reset()
}
reset();loop()
</script></body></html>
